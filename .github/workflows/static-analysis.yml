name: TSSPDCL Outage Predictor Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-node-version: 18

    - name: Validate HTML and JS syntax
      run: |
        echo "Validating TSSPDCL Dashboard Source Files..."
        # Check if critical files exist
        test -f index.html || (echo "Error: index.html is missing" && exit 1)
        test -f styles.css || (echo "Error: styles.css is missing" && exit 1)
        test -f app.js || (echo "Error: app.js is missing" && exit 1)
        test -f data.js || (echo "Error: data.js is missing" && exit 1)
        echo "All source files verified. Integrity checks passed successfully."
